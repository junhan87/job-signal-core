name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  id-token: write   # Required for OIDC — no long-lived credentials
  contents: read

jobs:
  deploy:
    name: CDK Deploy → ap-southeast-1
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Build Lambda layer
        run: |
          mkdir -p layer/python
          pip install -r requirements-lambda.txt -t layer/python

      - name: Configure AWS credentials (OIDC — no stored secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ap-southeast-1

      - name: CDK Deploy
        run: cdk deploy --require-approval never --all
